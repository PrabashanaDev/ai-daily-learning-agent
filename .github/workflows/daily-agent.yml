name: Daily AI Agent

# Run at 10:00 AM UTC every day, and allow manual triggering
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

# Add this environment variable to silence the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Give the action permission to push code to the repo
permissions:
  contents: write

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # Added 'requests' for the Dev.to API
        run: pip install python-dotenv google-genai requests

      - name: Run AI Agent (Creates the Note)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent.py

      - name: Push Changes back to GitHub
        run: git push

      - name: Run Publisher Agent (Creates the Blog Draft)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
        run: python publisher.py